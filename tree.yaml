# Дерево документации для страницы /docs/.
#
# Узел — это имя .md-файла (без расширения), либо объект с детьми:
#   - Имя файла                         # лист без подстатей
#   - doc: Имя файла                    # статья с подстатьями
#     children:
#       - Подстатья
#       - doc: Подстатья
#         children: [ ... ]             # глубина любая
#
# Каждый узел — реальный документ. Заголовок берётся из самого файла.
# Документы, которых здесь нет, попадают в раздел «Прочее» автоматически.

tree:
  - Создание мода

  - doc: Написание сценария
    children:
      - Переменные
      - Выборы
      - Добавление персонажа
      - Экраны
      - Руководство с примерами кода

  - doc: Изображения
    children:
      - Действия с изображениями
      - Спрайты
      - Фоны (BG)
      - Арты (CG)

  - doc: Использование карты
    children:
      - Создание собственной карты на примере мода «7 Дней Лета»

  - doc: audio
    children:
      - Музыка (music)
      - Звуковые эффекты (sfx)
      - Окружение (ambiences)
      - Видео

  - glossary

  - doc: Полезные ресурсы и ссылки
    children:
      - Ресурсы оригинальной игры
      - Ресурсы сообщества
      - Полезная литература
      - Новостные ресурсы

  - doc: Работа с GitHub
    children:
      - Работа с RPYC и RPA файлами
      - Портирование мода на Android с помощью ESTool
      - Распространённые ошибки и пути их решения
